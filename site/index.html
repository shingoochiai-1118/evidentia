<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Evidentia — エビデンスに基づく予防医学ノート</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Evidentia">
<meta name="theme-color" content="#0d1117">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%AD%90%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="site-header">
  <div class="brand">
    <span class="brand-mark">✦</span>
    <div class="brand-text">
      <h1>Evidentia</h1>
      <p class="tagline">家族の健康維持のために根拠のある知識を集める</p>
    </div>
  </div>
</header>

<main>
  <section class="controls">
    <div class="level-row">
      <span class="level-label" id="level-label">解説レベル</span>
      <div class="level-toggle" id="level-toggle" role="radiogroup" aria-labelledby="level-label">
        <button type="button" class="level-btn" data-level="basic" role="radio" aria-checked="false">やさしく</button>
        <button type="button" class="level-btn" data-level="general" role="radio" aria-checked="true">ふつう</button>
        <button type="button" class="level-btn" data-level="professional" role="radio" aria-checked="false">専門的</button>
      </div>
    </div>

    <div class="search-row">
      <label for="search" class="visually-hidden">キーワードで検索</label>
      <input id="search" type="search" placeholder="キーワードで検索 (例: 運動, サプリ, 頭痛)" autocomplete="off">
    </div>
    <div class="filter-row">
      <label for="star-filter" class="visually-hidden">信頼度で絞り込み</label>
      <select id="star-filter">
        <option value="0">信頼度: すべて</option>
        <option value="5">★5のみ</option>
        <option value="4">★4以上</option>
        <option value="3">★3以上</option>
      </select>
      <label for="sort" class="visually-hidden">並び替え</label>
      <select id="sort">
        <option value="stars_desc">信頼度が高い順</option>
        <option value="date_desc">新着順</option>
        <option value="stars_asc">信頼度が低い順</option>
      </select>
      <button type="button" class="chip" id="myth-toggle" aria-pressed="false">⚠️ 定説の見直しのみ</button>
    </div>
    <div class="chip-row" id="category-chips"></div>
  </section>

  <section id="results-meta" class="results-meta"></section>
  <section id="cards" class="card-grid"></section>
  <p id="empty-state" class="empty-state" hidden>該当する情報がまだありません。カテゴリを変えるか、Claudeに新しい記事の評価を依頼してください。</p>
</main>

<footer class="site-footer">
  <p>信頼度は医療ガイドラインの考え方(GRADE / Oxford CEBM)を参考にした独自基準です。詳細は <code>docs/evidence-rating.md</code> を参照。個々の健康判断は必ず主治医にご相談ください。</p>
</footer>

<script src="app.js"></script>
</body>
</html>
